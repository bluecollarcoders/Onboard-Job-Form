services:
  postgres:
    image: postgres:15-alpine
    container_name: job-onboarding-db
    environment:
      POSTGRES_USER: caleb
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: job_onboarding  
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data 

volumes:
  postgres-data:
    driver: local
